<header class="main-header">
        <div class="container header-container">
            <a href="#" class="logo" id="logo-btn" aria-label="Ponte Solidária Home">
                <div class="logo-icon">
                    <i data-lucide="hand-helping"></i>
                </div>
                <span class="logo-text">Ponte <span class="highlight">Solidária</span></span>
            </a>
            <nav class="main-nav" aria-label="Navegação Principal">
                <ul class="nav-list">
                    <li><a href="#" class="nav-link active" data-target="home-section" id="nav-home">Início</a></li>
                    <li><a href="#" class="nav-link" data-target="donations-section" id="nav-donations">Doações & Pedidos</a></li>
                    <li><a href="#" class="nav-link" data-target="brecho-section" id="nav-brecho">Brechó Solidário</a></li>
                    <li class="company-only hidden"><a href="#" class="nav-link" data-target="empresas-section" id="nav-empresas">Área RSE</a></li>
                    <li><a href="#" class="nav-link" data-target="transparency-section" id="nav-transparency">Transparência</a></li>
                    <li><a href="#" class="nav-link" data-target="about-section" id="nav-about">Sobre Nós</a></li>
                    <li class="admin-only hidden"><a href="#" class="nav-link" data-target="admin-section" id="nav-admin">Painel Adm</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <span class="connection-status demo" id="connection-status">Modo demonstracao</span>
                <!-- Notifications Bell -->
                <div class="notification-dropdown-container">
                    <button class="icon-btn" id="notif-btn" aria-haspopup="true" aria-expanded="false" aria-label="Notificações">
                        <i data-lucide="bell"></i>
                        <span class="badge hidden" id="notif-badge">0</span>
                    </button>
                    <div class="dropdown-menu notification-menu hidden" id="notif-menu">
                        <div class="dropdown-header">
                            <h4 id="txt-notifications">Notificações</h4>
                            <button class="clear-btn" id="clear-notif-btn">Limpar</button>
                        </div>
                        <ul class="notification-list" id="notification-list">
                            <!-- Inserido dinamicamente via JS -->
                        </ul>
                    </div>
                </div>

                <!-- Accessibility panel (Resizing & Contrast) -->
                <div class="accessibility-controls" style="display: flex; gap: 8px; align-items: center;">
                    <button class="icon-btn" id="btn-high-contrast" title="Alto Contraste" aria-label="Alternar Alto Contraste">
                        <i data-lucide="eye"></i>
                    </button>
                    <button class="icon-btn" id="btn-font-decrease" title="Diminuir Fonte" aria-label="Diminuir tamanho da fonte" style="font-weight: 800; font-size: 0.8rem; padding: 4px;">A-</button>
                    <button class="icon-btn" id="btn-font-increase" title="Aumentar Fonte" aria-label="Aumentar tamanho da fonte" style="font-weight: 800; font-size: 0.8rem; padding: 4px;">A+</button>
                </div>

                <!-- Theme Toggle -->
                <button class="icon-btn" id="theme-toggle-btn" aria-label="Alternar modo escuro">
                    <i data-lucide="moon" class="dark-icon"></i>
                    <i data-lucide="sun" class="light-icon hidden"></i>
                </button>

                <!-- Language Selector -->
                <div class="language-selector">
                    <button class="lang-btn" id="lang-toggle-btn" aria-label="Mudar idioma">
                        <i data-lucide="languages"></i>
                        <span id="current-lang-code">PT</span>
                    </button>
                    <div class="dropdown-menu lang-menu hidden" id="lang-menu">
                        <button class="lang-option" data-lang="pt-BR">Português (PT)</button>
                        <button class="lang-option" data-lang="en">English (EN)</button>
                    </div>
                </div>

                <!-- User Account Actions -->
                <div class="user-auth-zone" id="user-auth-zone">
                    <button class="btn btn-secondary btn-sm" id="open-login-btn">Entrar</button>
                    <button class="btn btn-primary btn-sm" id="open-register-btn">Cadastrar</button>
                </div>
                <div class="user-profile-zone hidden" id="user-profile-zone">
                    <div class="profile-summary">
                        <span class="user-avatar" id="user-avatar-char">U</span>
                        <div class="user-info-text">
                            <span class="user-name" id="user-display-name">Nome Usuário</span>
                            <span class="user-role-badge" id="user-display-role">Pessoa Comum</span>
                        </div>
                    </div>
                    <button class="icon-btn logout-btn" id="logout-btn" aria-label="Sair da conta">
                        <i data-lucide="log-out"></i>
                    </button>
                </div>

                <!-- Mobile Menu Button -->
                <button class="mobile-nav-toggle" aria-controls="main-nav" aria-expanded="false" aria-label="Menu principal">
                    <i data-lucide="menu" class="menu-icon"></i>
                    <i data-lucide="x" class="close-icon hidden"></i>
                </button>
            </div>
        </div>
    </header>
